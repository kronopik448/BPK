<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль</title>
    <link rel="stylesheet" href="prof.css">
</head>
<body>
    <header>
        <img src="phots/logoch.png" alt="Логотип профессионалов" class="logo">
        <img src="phots/logo.png" alt="Логотип колледжа" class="logo">
    </header>
    <section>
        <figure>
            <img src="phots/ecperct.jpg" alt="Фото 1">
            <figcaption>Эксперты</figcaption>
            <p>Главный эксперт компетенции «Разработчик мобильных игр» — Малянов Егор Вячеславович. В состав экспертной группы входят специалисты, ответственные за оценку конкурсного задания по 6 модулям, обеспечение охраны труда и соблюдение правил чемпионата.</p>
        </figure>
        <figure>
            <img src="phots/all.jpg" alt="Фото 2">
            <figcaption>Все участники профессионалов</figcaption>
            <p>Участникам регионального этапа предстоит за 3 соревновательных дня разработать игру для мобильных устройств «Лабиринтино». Конкурсанты создадут игровой арт, реализуют механики четырех мини-игр, систему хранения данных, оптимизируют код и представят свой проект экспертам.</p>
        </figure>
        <figure>
            <img src="phots/pedovski.jpg" alt="Фото 3">
            <figcaption>Педагоги-наставники</figcaption>
            <p>В период подготовки эксперты-наставники знакомятся с инфраструктурным листом, конкурсным заданием и геймдизайн-документом. Во время чемпионата их коммуникация с участниками строго регламентирована и возможна только с разрешения главного эксперта.</p>
        </figure>
    </section>

</body>
</html>
